<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test HTML TABLE</title>
  </head>
  <body>
    <video controls>
      <source src="video.mp4" type="video/mp4" />
    </video>
    <table>
      <caption>
        Employees
      </caption>
      <thead>
        <tr>
          <th>No</th>
          <th>Full name</th>
          <th>Position</th>
          <th>Salary</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td>
          <td>Bill Gates</td>
          <td>Founedr Microsoft</td>
          <td rowspan="24">1000</td>
        </tr>
        <tr>
          <td>2</td>
          <td>Steve Jobs</td>
          <td>Founedr Apple</td>
          <!-- <td>1500</td> -->
        </tr>
        <tr>
          <td>3</td>
          <td>Elon Musk</td>
          <td>Founedr Tesla</td>
          <!-- <td>2000</td> -->
        </tr>
        <tr>
          <td>4</td>
          <td>Jeff Bezos</td>
          <td>Founedr Amazon</td>
          <!-- <td>2500</td> -->
        </tr>
      </tbody>
      tfoot>
      <tr>
        <td></td>
        <td></td>
        <td></td>
        <td>4000</td>
      </tr>
    </table>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/C0DPdy98e4c?si=cr48dTik1hC3q_G-"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
    <p>Заголовок на сторінці виділяється тегом &lt;h1&gt;</p>
  </body>
</html>
